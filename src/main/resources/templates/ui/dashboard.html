<!DOCTYPE html>
<html lang="en"  xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            height: 100vh;
            background: #2c3e50;
            position: fixed;
            color: white;
            padding-top: 20px;
        }

        .sidebar h2 {
            text-align: center;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 12px 20px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #34495e;
        }

        /* Main Content */
        .main {
            margin-left: 220px;
            padding: 20px;
        }

        /* Navbar */
        .navbar {
            background: white;
            padding: 15px;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        /* Cards */
        .cards {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            width: 250px;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin: 0;
            color: #555;
        }

        .card p {
            font-size: 24px;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>My Dashboard</h2>
    <a href="#">Home</a>
    <a href="#">Users</a>
    <a href="#">Reports</a>
    <a href="#">Settings</a>
    <a th:href="@{/employee/logout}">Logout</a>
</div>

<!-- Main Content -->
<div class="main">

    <!-- Navbar -->
    <div class="navbar">
        <h2>Welcome, <span th:if="${session.emp!=null}" th:text="${session.emp.name}"></span> 👋</h2>
    </div>
    
    <div>
	    <div th:if="${success}" class="message success" th:text="${success}"></div>
</div>
    

    <!-- Cards -->
    <div class="cards">

        <div class="card">
            <h3>Total Users</h3>
            <p>120</p>
        </div>

        <div class="card">
            <h3>Orders</h3>
            <p>75</p>
        </div>

        <div class="card">
            <h3>Revenue</h3>
            <p>₹45,000</p>
        </div>

        <div class="card">
            <h3>Messages</h3>
            <p>18</p>
        </div>

    </div>
<a th:href="@{/student/show}">Show All Students</a>

</div>

</body>
</html>
