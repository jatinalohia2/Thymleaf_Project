<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Entry Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen py-12 px-4">

    <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
        <div class="bg-gradient-to-r from-blue-600 to-indigo-700 px-8 py-6">
        
        <div>
        		<p style="color: green; text-align: center;" th:if="${success!=null}"  th:text="${success}">
        	</div>
        	
            <h2 class="text-2xl font-bold text-white">Add New Product</h2>
            <p class="text-blue-100 text-sm">Fill in the details to register a product in the system.</p>
        </div>

        <form th:action="@{/product/save}" th:object="${product}" method="POST" class="p-8 space-y-6">
            

            <div>
                <label for="name" class="block text-sm font-semibold text-gray-700 mb-2">Product Name</label>
                <input type="text" id="name" name="name" required th:field="*{name}"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                    placeholder="Enter product title">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="costPrice" class="block text-sm font-semibold text-gray-700 mb-2">Cost Price</label>
                    <div class="relative">
                        <span class="absolute left-3 top-3 text-gray-400">$</span>
                        <input th:field="*{costPrice}" type="number" step="0.01" id="costPrice" name="costPrice" required
                            class="w-full pl-8 pr-4 py-3 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                            placeholder="0.00">
                    </div>
                </div>

                <div>
                    <label for="mrp" class="block text-sm font-semibold text-gray-700 mb-2">MRP</label>
                    <div class="relative">
                        <span class="absolute left-3 top-3 text-gray-400">$</span>
                        <input  th:field="*{mrp}" type="number" step="0.01" id="mrp" name="mrp" required
                            class="w-full pl-8 pr-4 py-3 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                            placeholder="0.00">
                    </div>
                </div>
            </div>

            <div>
                <label for="productCategory" class="block text-sm font-semibold text-gray-700 mb-2">Product Category</label>
                <div class="relative">
                    <select th:field="*{productCategory.id}" id="productCategory" name="productCategory.id" required
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none appearance-none transition-all">
                        <option value="" disabled selected>Select a category</option>
                       	<option th:each=" a : ${categoryList}"  th:text="${a.category}" th:value="${a.id}"></option>
                       
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                        </svg>
                    </div>
                </div>
            </div>

            <div>
                <label for="createdAt" class="block text-sm font-semibold text-gray-700 mb-2">Creation Date/Time</label>
                <input th:field="*{createdAt}" type="datetime-local" id="createdAt" name="createdAt"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                <p class="mt-2 text-xs text-gray-400 font-light italic">Leave empty to use current system time.</p>
            </div>

            <div class="pt-6 flex items-center justify-end space-x-4 border-t border-gray-100">
                <button type="reset" class="px-6 py-3 text-sm font-semibold text-gray-500 hover:text-gray-800 transition-colors">
                    Clear Form
                </button>
                <button type="submit" class="px-10 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-lg shadow-indigo-200 transform active:scale-95 transition-all">
                    Save Product
                </button>
            </div>
        </form>
    </div>

</body>
</html>
